services:
  web-automatico:
    build: .
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
    networks:
      - default
    depends_on:
      - database-santo
    environment:
      - DB_HOST=database-santo
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-mio_database}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
    restart: unless-stopped

  database-santo:
    image: mariadb:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-mio_database}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  dashboard-db:
    image: adminer:latest
    restart: always
    ports:
      - "8082:8080"
    depends_on:
      - database-santo

  monitoraggio:
    image: portainer/portainer-ce:latest
    restart: always
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
  db_data: