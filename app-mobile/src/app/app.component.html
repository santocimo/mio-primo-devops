<ion-app>
  <!-- Side menu (visible only when logged in) -->
  <ion-menu contentId="main-content" *ngIf="(authState$ | async)?.isLoggedIn">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Menu</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <ion-item button routerLink="/dashboard" routerLinkActive="active-link" (click)="$event.stopPropagation()">
          <ion-icon name="people-outline" slot="start"></ion-icon>
          <ion-label>Visitatori</ion-label>
        </ion-item>

        <!-- Admin-only section -->
        <ng-container *ngIf="isAdmin()">
          <ion-item-divider>
            <ion-label>Amministrazione</ion-label>
          </ion-item-divider>
          <ion-item button routerLink="/admin/users" routerLinkActive="active-link">
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-label>Utenti</ion-label>
          </ion-item>
          <ion-item button routerLink="/admin/gyms" routerLinkActive="active-link">
            <ion-icon name="business-outline" slot="start"></ion-icon>
            <ion-label>Sedi</ion-label>
          </ion-item>
          <ion-item button routerLink="/admin/services" routerLinkActive="active-link">
            <ion-icon name="list-outline" slot="start"></ion-icon>
            <ion-label>Servizi</ion-label>
          </ion-item>
          <ion-item button routerLink="/admin/appointments" routerLinkActive="active-link">
            <ion-icon name="calendar-outline" slot="start"></ion-icon>
            <ion-label>Appuntamenti</ion-label>
          </ion-item>
          <ion-item button routerLink="/admin/settings" routerLinkActive="active-link">
            <ion-icon name="settings-outline" slot="start"></ion-icon>
            <ion-label>Impostazioni</ion-label>
          </ion-item>
        </ng-container>

        <ion-item-divider></ion-item-divider>
        <ion-item button (click)="logout()">
          <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
          <ion-label color="danger">Esci</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
