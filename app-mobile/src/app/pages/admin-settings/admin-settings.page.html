<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Impostazioni</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-list-header>
      <ion-label><h2>Configurazione App</h2></ion-label>
    </ion-list-header>

    <ion-item>
      <ion-label position="stacked">Tipo di attività predefinito</ion-label>
      <ion-select [(ngModel)]="businessType" interface="popover">
        <ion-select-option *ngFor="let bt of businessTypes" [value]="bt.value">{{ bt.label }}</ion-select-option>
      </ion-select>
    </ion-item>
  </ion-list>

  <div class="ion-padding-top">
    <ion-button expand="block" (click)="save()" [disabled]="saving">
      <ion-spinner *ngIf="saving" slot="start" name="crescent"></ion-spinner>
      {{ saving ? 'Salvataggio...' : 'Salva impostazioni' }}
    </ion-button>
  </div>
</ion-content>
